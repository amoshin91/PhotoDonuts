name: Deploy to GitHub Pages

# Publishes the static site to GitHub Pages on every push to main.
# Uses the Actions-based deploy so Pages can be enabled straight from this
# workflow (no manual repo-settings step needed).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow one concurrent deployment; newer pushes supersede in-progress ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enables it if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site as a Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
