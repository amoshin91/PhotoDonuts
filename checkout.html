<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbf7f0" />
  <title>Checkout — Glaze &amp; Co.</title>
  <meta name="description" content="Review your order, choose a pickup store and time, and pay." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Leaflet (free map, OpenStreetMap tiles — no API key required) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23f4ecd9' stroke='%23e8b873' stroke-width='8'/><circle cx='50' cy='50' r='14' fill='white'/></svg>" />
</head>
<body>
  <a class="skip-link" href="#checkoutMain">Skip to checkout</a>

  <!-- ============================ HEADER ============================ -->
  <header class="site-header" id="top">
    <div class="wrap site-header__inner">
      <a class="brand" href="index.html" aria-label="Glaze and Co. home">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="34" height="34"><circle cx="20" cy="20" r="16" fill="#f4ecd9" stroke="#e8b873" stroke-width="5"/><circle cx="20" cy="20" r="5.5" fill="#fff"/><circle cx="13" cy="14" r="1.5" fill="#e83e8c"/><circle cx="27" cy="16" r="1.5" fill="#1971c2"/><circle cx="24" cy="27" r="1.5" fill="#ffd43b"/></svg>
        </span>
        <span class="brand__name">Glaze<span class="brand__amp">&amp;</span>Co.</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="index.html#featured">Boxes</a>
        <a href="index.html#builder">Build</a>
        <a href="index.html#how">How it works</a>
        <a href="index.html#stores">Stores</a>
      </nav>
      <button class="cart-button" id="cartButton" aria-label="Back to your cart">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="M3 4h2l2.4 11.5a2 2 0 0 0 2 1.6h7.7a2 2 0 0 0 2-1.5L22 8H6"/><circle cx="10" cy="20" r="1.4" fill="currentColor"/><circle cx="18" cy="20" r="1.4" fill="currentColor"/></svg>
        <span class="cart-button__label">Cart</span>
        <span class="cart-button__count" id="cartCount" hidden>0</span>
      </button>
    </div>
  </header>

  <!-- ============================ CHECKOUT ============================ -->
  <main class="checkout-page wrap">
    <a class="checkout-back" href="index.html#builder">← Back to builder</a>
    <h1 class="section-heading">Checkout</h1>
    <div id="checkoutMain" class="checkout-main"><!-- rendered by app.js --></div>
  </main>

  <!-- ============================ FOOTER ============================ -->
  <footer class="site-footer">
    <div class="wrap site-footer__inner">
      <div>
        <span class="brand__name brand__name--footer">Glaze<span class="brand__amp">&amp;</span>Co.</span>
        <p class="site-footer__tag">Small-batch donuts, built your way.</p>
      </div>
    </div>
    <p class="site-footer__legal">Prices, hours, and availability shown are placeholders for demonstration. Allergen information is illustrative — confirm in store.</p>
  </footer>

  <!-- toast region -->
  <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

  <!-- Leaflet map library (loaded before app.js; app falls back to a static map if unavailable) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>

  <!-- scripts (plain scripts so it runs over file://) -->
  <script src="js/config.js"></script>
  <script src="js/donut-svg.js"></script>
  <script src="js/pricing.js"></script>
  <script src="js/pickup.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
